<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akses Ditolak - Waka Kurikulum</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #F1F5F9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        color: #0F172A;
      }
      .login-card {
        background: white;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        text-align: center;
        max-width: 400px;
        width: 90%;
        border-top: 5px solid #EF4444;
      }
      .login-card h2 { color: #EF4444; margin-top: 0; }
      .email-box {
        background: #F1F5F9;
        padding: 10px;
        border-radius: 6px;
        font-weight: 600;
        margin: 20px 0;
        word-break: break-all;
        border: 1px solid #E2E8F0;
      }
      .btn {
        display: inline-block;
        background-color: #3B82F6;
        color: white;
        text-decoration: none;
        padding: 12px 20px;
        border-radius: 6px;
        font-weight: 600;
        margin-top: 15px;
        width: 100%;
        box-sizing: border-box;
      }
      .btn:hover { background-color: #1E3A8A; }
    </style>
  </head>
  <body>
    <div class="login-card">
      <i class="fa-solid fa-lock" style="font-size: 3rem; color: #EF4444; margin-bottom: 15px;"></i>
      <h2>Akses Ditolak</h2>
      <p style="color: #64748B;">Maaf, Anda belum memiliki akses ke Sistem Waka Kurikulum.</p>
      
      <div style="font-size: 0.9rem;">Email Google Anda saat ini:</div>
      <div class="email-box"><?= email ?></div>
      
      <p style="font-size: 0.85rem; color: #64748B;">Hubungi Waka Kurikulum untuk mendaftarkan email ini ke dalam Master Data Guru, atau login menggunakan akun Google lain yang sudah terdaftar.</p>
      
      <a href="https://accounts.google.com/AccountChooser?continue=https://script.google.com/macros/s/AKfycbw9h_5omdk57R0rOANj3JaiM6v_AV-LR0ndi3srsZFvpnADmBdILeJth5dNdRcc0DA/exec" class="btn"><i class="fa-brands fa-google"></i> Ganti Akun Google</a>
    </div>
  </body>
</html>
